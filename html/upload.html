<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传 — PullNail</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .upload-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .drop-zone {
            border: 2px dashed var(--accent-dark);
            border-radius: 15px;
            padding: 3rem 2rem;
            text-align: center;
            background: rgba(255,255,255,0.4);
            transition: background 0.2s;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }
        .drop-zone.dragover {
            background: rgba(211, 84, 0, 0.1);
        }
        .drop-zone p {
            margin: 0.5rem 0;
            font-size: 1.1rem;
            color: var(--text-muted);
        }
        .file-list {
            list-style: none;
            padding: 0;
        }
        .file-list li {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-list .progress-bar {
            width: 100px;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
            margin-left: 1rem;
        }
        .file-list .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
        }
        .btn-upload {
            margin-top: 1rem;
            display: none;
        }
        .status-message {
            margin-top: 1rem;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="nav-logo">🧱 PullNail</a>
        <button class="nav-toggle" id="navToggle">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html">首页</a></li>
            <li><a href="links.html">🕹️ 更多游戏</a></li>
            <li class="dropdown" id="communityDropdown">
                <span class="dropdown-toggle" id="communityToggle">🗣️ 社区与反馈 ▾</span>
                <ul class="dropdown-menu">
                    <li><a href="https://github.com/NullLis/PullNail/issues">💬 问题反馈</a></li>
                    <li><a href="mailto:NullLis@example.com">📧 联系开发者</a></li>
                    <li><a href="https://github.com/NullLis/PullNail">🌟 支持项目</a></li>
                </ul>
            </li>
            <li><a href="download.html">📥 下载游戏</a></li>
            <li><a href="update.html">📅 更新日志</a></li>
            <li><a href="upload.html" class="active">📤 上传文件</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>📤 文件上传</h1>
            <p class="subtitle">拖拽或选择文件，一键上传到服务器</p>
        </header>

        <section>
            <div class="upload-container">
                <!-- 拖拽区域 -->
                <div class="drop-zone" id="dropZone">
                    <p><strong>拖拽文件到此处</strong></p>
                    <p>或 <span style="color: var(--accent-dark); font-weight:600;">点击选择文件</span></p>
                    <input type="file" id="fileInput" multiple style="display: none;">
                </div>

                <!-- 待上传文件列表 -->
                <ul class="file-list" id="fileList"></ul>

                <!-- 全部上传按钮 -->
                <button class="btn btn-primary btn-upload" id="uploadAllBtn" style="width:100%;">上传所有文件</button>

                <!-- 状态提示 -->
                <div class="status-message" id="statusMessage"></div>
            </div>
        </section>

        <div class="footer">
            <div class="footer-links">
                <a href="#">服务条款</a>
                <a href="privacy.html">隐私政策</a>
            </div>
            Built with ❤️ and Unreal Engine 5 &nbsp;|&nbsp; © 2026 NullLis
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileListEl = document.getElementById('fileList');
        const uploadAllBtn = document.getElementById('uploadAllBtn');
        const statusMsg = document.getElementById('statusMessage');

        // ========== 配置上传 API 地址 ==========
        // 请替换为你的真实上传接口（例如 Cloudflare Worker 提供的 R2 预签名 URL，或任何接受 PUT 请求的地址）
        const UPLOAD_BASE_URL = 'https://your-worker.your-subdomain.workers.dev/upload/';
        // 如果不需要动态文件名，可以直接使用固定地址

        // 存储待上传的文件
        let pendingFiles = [];

        // 点击区域触发文件选择
        dropZone.addEventListener('click', () => fileInput.click());

        // 文件选择事件
        fileInput.addEventListener('change', (e) => {
            addFiles(e.target.files);
            fileInput.value = '';
        });

        // 拖拽事件
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });

        // 添加文件到列表
        function addFiles(files) {
            for (const file of files) {
                if (pendingFiles.some(f => f.name === file.name)) {
                    alert(`文件 "${file.name}" 已存在列表中。`);
                    continue;
                }
                pendingFiles.push(file);
                renderFileList();
            }
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        }

        // 渲染文件列表
        function renderFileList() {
            fileListEl.innerHTML = '';
            pendingFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${file.name} (${formatSize(file.size)})</span>
                    <div style="display:flex;align-items:center;">
                        <div class="progress-bar" id="progress-${index}"><div class="progress-fill"></div></div>
                        <button class="btn btn-outline" style="padding:0.2rem 0.8rem;margin-left:1rem;" onclick="removeFile(${index})">移除</button>
                    </div>
                `;
                fileListEl.appendChild(li);
            });
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/(1024*1024)).toFixed(1) + ' MB';
        }

        // 移除单个文件
        window.removeFile = function(index) {
            pendingFiles.splice(index, 1);
            renderFileList();
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        };

        // 上传所有文件
        uploadAllBtn.addEventListener('click', async () => {
            if (pendingFiles.length === 0) return;
            uploadAllBtn.disabled = true;
            statusMsg.textContent = '上传中...';

            let successCount = 0, failCount = 0;
            for (let i = 0; i < pendingFiles.length; i++) {
                const file = pendingFiles[i];
                try {
                    await uploadFile(file, i);
                    successCount++;
                } catch (err) {
                    console.error(err);
                    failCount++;
                }
            }
            statusMsg.textContent = `上传完成：成功 ${successCount} 个，失败 ${failCount} 个`;
            uploadAllBtn.disabled = false;
            if (failCount === 0) {
                pendingFiles = [];
                renderFileList();
                uploadAllBtn.style.display = 'none';
            }
        });

        // 单文件上传函数（PUT 方式）
        async function uploadFile(file, index) {
            const progressBar = document.querySelector(`#progress-${index} .progress-fill`);
            const url = UPLOAD_BASE_URL + encodeURIComponent(file.name);

            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', url, true);
                xhr.setRequestHeader('Content-Type', 'application/octet-stream');

                // 上传进度
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressBar.style.width = percent + '%';
                    }
                };

                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        progressBar.style.width = '100%';
                        resolve();
                    } else {
                        reject(new Error(`上传失败，状态码 ${xhr.status}`));
                    }
                };

                xhr.onerror = () => reject(new Error('网络错误'));
                xhr.send(file);
            });
        }
    </script>
</body>
</html>
