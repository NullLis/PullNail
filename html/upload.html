<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传 — PullNail</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <header>
            <h1>📤 文件上传</h1>
            <p class="subtitle">拖拽或选择文件，直接上传到 GitHub 仓库的 download 目录</p>
        </header>

        <section>
            <div class="upload-container">
                <div class="drop-zone" id="dropZone">
                    <p><strong>拖拽文件到此处</strong></p>
                    <p>或 <span style="color: var(--accent-dark); font-weight:600;">点击选择文件</span></p>
                    <input type="file" id="fileInput" multiple style="display: none;">
                </div>

                <ul class="file-list" id="fileList"></ul>

                <button class="btn btn-primary btn-upload" id="uploadAllBtn" style="width:100%;">上传所有文件</button>
                <div class="status-message" id="statusMessage"></div>
            </div>
        </section>
    </div>

    <div id="footer-container"></div>

    <script src="../js/components.js"></script>
    <script>
        // ========== GitHub 配置（请务必替换为你自己的信息）==========
        const GITHUB_TOKEN = 'ghp_你的个人访问令牌';   // ⚠️ 需要 repo 权限
        const OWNER = 'NullLis';                       // 你的 GitHub 用户名
        const REPO = 'PullNail';                       // 仓库名
        const BRANCH = 'main';                         // 分支
        const UPLOAD_DIR = 'download/';                // 上传到仓库中的目标目录

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileListEl = document.getElementById('fileList');
        const uploadAllBtn = document.getElementById('uploadAllBtn');
        const statusMsg = document.getElementById('statusMessage');
        let pendingFiles = [];

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            addFiles(e.target.files);
            fileInput.value = '';
        });
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });

        function addFiles(files) {
            for (const file of files) {
                if (pendingFiles.some(f => f.name === file.name)) {
                    alert(`文件 "${file.name}" 已存在列表中。`);
                    continue;
                }
                pendingFiles.push(file);
            }
            renderFileList();
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        }

        function renderFileList() {
            fileListEl.innerHTML = '';
            pendingFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${escapeHtml(file.name)} (${formatSize(file.size)})</span>
                    <div style="display:flex;align-items:center;">
                        <div class="progress-bar" id="progress-${index}"><div class="progress-fill"></div></div>
                        <button class="btn btn-outline" style="padding:0.2rem 0.8rem;margin-left:1rem;" onclick="removeFile(${index})">移除</button>
                    </div>
                `;
                fileListEl.appendChild(li);
            });
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/(1024*1024)).toFixed(1) + ' MB';
        }

        window.removeFile = function(index) {
            pendingFiles.splice(index, 1);
            renderFileList();
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        };

        uploadAllBtn.addEventListener('click', async () => {
            if (pendingFiles.length === 0) return;
            uploadAllBtn.disabled = true;
            statusMsg.textContent = '上传中...';
            let success = 0, fail = 0;
            for (let i = 0; i < pendingFiles.length; i++) {
                try {
                    await uploadFileToGitHub(pendingFiles[i], i);
                    success++;
                } catch (err) {
                    console.error(err);
                    fail++;
                }
            }
            statusMsg.textContent = `上传完成：成功 ${success} 个，失败 ${fail} 个`;
            uploadAllBtn.disabled = false;
            if (fail === 0) {
                pendingFiles = [];
                renderFileList();
                uploadAllBtn.style.display = 'none';
            }
        });

        /**
         * 将文件上传到 GitHub 仓库指定目录
         * 若文件已存在，则获取最新 SHA 并更新；否则直接创建
         */
        async function uploadFileToGitHub(file, index) {
            const progressBar = document.querySelector(`#progress-${index} .progress-fill`);
            const filePath = UPLOAD_DIR + file.name;
            const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`;

            // 读取文件内容并转为 Base64（去除换行符）
            const base64Content = await fileToBase64(file);

            // 第一步：尝试获取现有文件的 SHA（用于更新）
            let sha = null;
            try {
                const getResp = await fetch(apiUrl + '?ref=' + BRANCH, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (getResp.ok) {
                    const existing = await getResp.json();
                    sha = existing.sha;
                }
                // 404 表示文件不存在，sha 保持 null
            } catch (e) {
                // 网络错误，忽略，尝试直接创建（可能因已存在而失败）
            }

            // 构造请求体
            const body = {
                message: `Upload ${file.name}`,
                content: base64Content,
                branch: BRANCH
            };
            if (sha) {
                body.sha = sha;   // 带上 SHA 表示更新现有文件
            }

            // 第二步：发送 PUT 请求创建/更新文件
            const putResp = await fetch(apiUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!putResp.ok) {
                const error = await putResp.text();
                throw new Error(`GitHub API 错误 (${putResp.status}): ${error}`);
            }

            // 上传成功，进度条填满
            progressBar.style.width = '100%';
        }

        /**
         * 将 File 对象转换为纯 Base64 字符串（不含 data URI 前缀）
         */
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const arrayBuffer = reader.result;
                    const bytes = new Uint8Array(arrayBuffer);
                    // 将字节数组转为字符串（很关键：处理大文件时可能内存紧张）
                    let binary = '';
                    const chunkSize = 8192;
                    for (let i = 0; i < bytes.length; i += chunkSize) {
                        binary += String.fromCharCode(...bytes.slice(i, i + chunkSize));
                    }
                    // 使用 btoa 进行 Base64 编码
                    const base64 = btoa(binary);
                    // GitHub 要求 Base64 不能包含换行，btoa 本身不含换行，但安全起见可替换
                    resolve(base64.replace(/\n/g, ''));
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }
    </script>
</body>
</html>
