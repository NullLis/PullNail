<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传 — PullNail</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <header>
            <h1>📤 文件上传</h1>
            <p class="subtitle">拖拽或选择文件，输入 GitHub 令牌与目标目录后上传</p>
        </header>

        <section>
            <div class="upload-container">
                <!-- 令牌输入 -->
                <div style="margin-bottom: 1rem;">
                    <label for="tokenInput" style="font-weight:600; display:block; margin-bottom:0.3rem;">🔑 GitHub 令牌（需要 repo 权限）</label>
                    <input type="password" id="tokenInput" placeholder="请输入你的 GitHub Personal Access Token" style="width:100%; padding:0.7rem 1rem; border: 1px solid var(--card-border); border-radius: 10px; background: var(--card-bg); font-size:0.95rem;">
                </div>

                <!-- 上传目录输入 -->
                <div style="margin-bottom: 1.5rem;">
                    <label for="dirInput" style="font-weight:600; display:block; margin-bottom:0.3rem;">📁 上传目录（例如 download/ 或 apk/）</label>
                    <input type="text" id="dirInput" placeholder="download/" value="download/" style="width:100%; padding:0.7rem 1rem; border: 1px solid var(--card-border); border-radius: 10px; background: var(--card-bg); font-size:0.95rem;">
                    <small style="color: var(--text-muted);">留空则上传到仓库根目录，请勿包含 <code>..</code> 等特殊字符。</small>
                </div>

                <div class="drop-zone" id="dropZone">
                    <p><strong>拖拽文件到此处</strong></p>
                    <p>或 <span style="color: var(--accent-dark); font-weight:600;">点击选择文件</span></p>
                    <input type="file" id="fileInput" multiple style="display: none;">
                </div>

                <ul class="file-list" id="fileList"></ul>

                <button class="btn btn-primary btn-upload" id="uploadAllBtn" style="width:100%;">上传所有文件</button>
                <div class="status-message" id="statusMessage"></div>
            </div>
        </section>
    </div>

    <div id="footer-container"></div>

    <script src="../js/components.js"></script>
    <script>
        // ========== GitHub 仓库配置 ==========
        const OWNER = 'NullLis';                       // 你的 GitHub 用户名
        const REPO = 'PullNail';                       // 仓库名
        const BRANCH = 'main';                         // 分支

        const tokenInput = document.getElementById('tokenInput');
        const dirInput = document.getElementById('dirInput');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileListEl = document.getElementById('fileList');
        const uploadAllBtn = document.getElementById('uploadAllBtn');
        const statusMsg = document.getElementById('statusMessage');
        let pendingFiles = [];

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            addFiles(e.target.files);
            fileInput.value = '';
        });
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });

        function addFiles(files) {
            for (const file of files) {
                if (pendingFiles.some(f => f.name === file.name)) {
                    alert(`文件 "${file.name}" 已存在列表中。`);
                    continue;
                }
                pendingFiles.push(file);
            }
            renderFileList();
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        }

        function renderFileList() {
            fileListEl.innerHTML = '';
            pendingFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${escapeHtml(file.name)} (${formatSize(file.size)})</span>
                    <div style="display:flex;align-items:center;">
                        <div class="progress-bar" id="progress-${index}"><div class="progress-fill"></div></div>
                        <button class="btn btn-outline" style="padding:0.2rem 0.8rem;margin-left:1rem;" onclick="removeFile(${index})">移除</button>
                    </div>
                `;
                fileListEl.appendChild(li);
            });
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/(1024*1024)).toFixed(1) + ' MB';
        }

        window.removeFile = function(index) {
            pendingFiles.splice(index, 1);
            renderFileList();
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        };

        uploadAllBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            if (!token) {
                alert('请先输入 GitHub 令牌！');
                return;
            }

            // 获取并校验上传目录
            let uploadDir = dirInput.value.trim();
            // 简单禁止路径遍历
            if (uploadDir.includes('..')) {
                alert('上传目录不能包含 ".."！');
                return;
            }
            // 如果非空且末尾没有斜杠，自动追加斜杠
            if (uploadDir !== '' && !uploadDir.endsWith('/')) {
                uploadDir += '/';
            }

            if (pendingFiles.length === 0) return;

            uploadAllBtn.disabled = true;
            statusMsg.textContent = '上传中...';
            let success = 0, fail = 0;
            for (let i = 0; i < pendingFiles.length; i++) {
                try {
                    await uploadFileToGitHub(pendingFiles[i], i, token, uploadDir);
                    success++;
                } catch (err) {
                    console.error(err);
                    fail++;
                }
            }
            statusMsg.textContent = `上传完成：成功 ${success} 个，失败 ${fail} 个`;
            uploadAllBtn.disabled = false;
            if (fail === 0) {
                pendingFiles = [];
                renderFileList();
                uploadAllBtn.style.display = 'none';
            }
        });

        async function uploadFileToGitHub(file, index, token, uploadDir) {
            const progressBar = document.querySelector(`#progress-${index} .progress-fill`);
            const filePath = uploadDir + file.name;
            const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`;

            const base64Content = await fileToBase64(file);

            // 获取现有 SHA（如果存在）
            let sha = null;
            try {
                const getResp = await fetch(apiUrl + '?ref=' + BRANCH, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (getResp.ok) {
                    const existing = await getResp.json();
                    sha = existing.sha;
                }
            } catch (e) { /* 忽略 */ }

            const body = {
                message: `Upload ${file.name}`,
                content: base64Content,
                branch: BRANCH
            };
            if (sha) body.sha = sha;

            const putResp = await fetch(apiUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!putResp.ok) {
                const error = await putResp.text();
                throw new Error(`GitHub API 错误 (${putResp.status}): ${error}`);
            }

            progressBar.style.width = '100%';
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const arrayBuffer = reader.result;
                    const bytes = new Uint8Array(arrayBuffer);
                    let binary = '';
                    const chunkSize = 8192;
                    for (let i = 0; i < bytes.length; i += chunkSize) {
                        binary += String.fromCharCode(...bytes.slice(i, i + chunkSize));
                    }
                    const base64 = btoa(binary);
                    resolve(base64.replace(/\n/g, ''));
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }
    </script>
</body>
</html>
