<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传 — PullNail</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <header>
            <h1>📤 文件上传</h1>
            <p class="subtitle">拖拽或选择文件，输入令牌后可上传，支持拆分大文件，查看仓库状态</p>
        </header>

        <section>
            <div class="upload-container">
                <!-- 令牌输入 -->
                <div style="margin-bottom: 1rem;">
                    <label for="tokenInput" style="font-weight:600; display:block; margin-bottom:0.3rem;">🔑 GitHub 令牌（需要 repo 权限）</label>
                    <input type="password" id="tokenInput" placeholder="请输入你的 GitHub Personal Access Token" style="width:100%; padding:0.7rem 1rem; border: 1px solid var(--card-border); border-radius: 10px; background: var(--card-bg); font-size:0.95rem;">
                </div>

                <!-- 上传目录输入 + 刷新按钮 -->
                <div style="margin-bottom: 1rem;">
                    <label for="dirInput" style="font-weight:600; display:block; margin-bottom:0.3rem;">📁 上传目录（例如 download/ 或 apk/）</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="dirInput" placeholder="download/" value="download/" style="flex:1; padding:0.7rem 1rem; border: 1px solid var(--card-border); border-radius: 10px; background: var(--card-bg); font-size:0.95rem;">
                        <button class="btn btn-outline" id="refreshDirBtn" style="padding:0.5rem 1rem;">刷新目录</button>
                    </div>
                    <small style="color: var(--text-muted);">留空则上传到仓库根目录，请勿包含 <code>..</code> 等特殊字符。</small>
                </div>

                <!-- 仓库容量显示 -->
                <div id="repoSize" style="margin-bottom: 1rem; padding:0.5rem 0; font-weight:600; color: var(--text-muted);">
                    仓库大小：加载中…
                </div>

                <!-- 当前目录文件列表 -->
                <div style="margin-bottom: 1.5rem;">
                    <h4 style="margin-bottom:0.5rem;">📂 当前目录文件：</h4>
                    <div id="dirFileList" style="max-height: 200px; overflow-y: auto; background: var(--card-bg); border-radius: 10px; padding:0.5rem;">
                        加载中…
                    </div>
                </div>

                <!-- 拆分上传选项 -->
                <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                    <label style="font-weight:600;">
                        <input type="checkbox" id="splitCheckbox"> 拆分上传
                    </label>
                    <label style="font-weight:600;">
                        分块大小：
                        <input type="number" id="splitSize" value="1" min="1" step="1" style="width:70px; padding:0.4rem; border:1px solid var(--card-border); border-radius:6px;"> MB
                    </label>
                </div>

                <div class="drop-zone" id="dropZone">
                    <p><strong>拖拽文件到此处</strong></p>
                    <p>或 <span style="color: var(--accent-dark); font-weight:600;">点击选择文件</span></p>
                    <input type="file" id="fileInput" multiple style="display: none;">
                </div>

                <ul class="file-list" id="fileList"></ul>

                <button class="btn btn-primary btn-upload" id="uploadAllBtn" style="width:100%;">上传所有文件</button>
                <div class="status-message" id="statusMessage"></div>
            </div>
        </section>
    </div>

    <div id="footer-container"></div>

    <script src="../js/components.js"></script>
    <script>
        // ========== GitHub 仓库配置 ==========
        const OWNER = 'NullLis';
        const REPO = 'PullNail';
        const BRANCH = 'main';

        const tokenInput = document.getElementById('tokenInput');
        const dirInput = document.getElementById('dirInput');
        const refreshDirBtn = document.getElementById('refreshDirBtn');
        const splitCheckbox = document.getElementById('splitCheckbox');
        const splitSizeInput = document.getElementById('splitSize');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileListEl = document.getElementById('fileList');
        const uploadAllBtn = document.getElementById('uploadAllBtn');
        const statusMsg = document.getElementById('statusMessage');
        const repoSizeEl = document.getElementById('repoSize');
        const dirFileListEl = document.getElementById('dirFileList');
        let pendingFiles = [];

        // ========== 工具函数 ==========
        async function getToken() {
            return tokenInput.value.trim();
        }

        function getAuthHeaders(token) {
            const headers = { 'Accept': 'application/vnd.github.v3+json' };
            if (token) headers['Authorization'] = `token ${token}`;
            return headers;
        }

        // ========== 仓库容量 ==========
        async function loadRepoSize() {
            try {
                const token = await getToken();
                const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}`, {
                    headers: getAuthHeaders(token)
                });
                if (resp.ok) {
                    const data = await resp.json();
                    const sizeKB = data.size || 0; // KB
                    let sizeStr;
                    if (sizeKB > 1024*1024) sizeStr = (sizeKB/(1024*1024)).toFixed(2) + ' GB';
                    else if (sizeKB > 1024) sizeStr = (sizeKB/1024).toFixed(2) + ' MB';
                    else sizeStr = sizeKB + ' KB';
                    repoSizeEl.textContent = `仓库大小：${sizeStr}`;
                } else {
                    repoSizeEl.textContent = '仓库大小：获取失败';
                }
            } catch {
                repoSizeEl.textContent = '仓库大小：网络错误';
            }
        }

        // ========== 目录文件列表 ==========
        async function loadDirectoryContents() {
            let dir = dirInput.value.trim();
            // 移除首尾斜杠并恢复正确路径（API 需要相对于仓库根的路径，不以 / 开头）
            if (dir.startsWith('/')) dir = dir.substring(1);
            // 空路径表示根目录
            const apiPath = dir ? `contents/${dir}` : 'contents';
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/${apiPath}`;

            dirFileListEl.innerHTML = '加载中…';
            try {
                const token = await getToken();
                const resp = await fetch(url, { headers: getAuthHeaders(token) });
                if (!resp.ok) {
                    if (resp.status === 404) {
                        dirFileListEl.innerHTML = '⚠️ 目录不存在或为空。';
                    } else {
                        dirFileListEl.innerHTML = `⚠️ 加载失败 (${resp.status})`;
                    }
                    return;
                }
                const data = await resp.json();
                if (!Array.isArray(data) || data.length === 0) {
                    dirFileListEl.innerHTML = '（空目录）';
                    return;
                }
                let html = '<ul style="list-style:none; padding:0; margin:0;">';
                data.forEach(item => {
                    const typeIcon = item.type === 'dir' ? '📁' : '📄';
                    const name = escapeHtml(item.name);
                    const size = item.size !== undefined ? formatSize(item.size) : '—';
                    html += `<li style="padding:0.2rem 0; border-bottom:1px solid rgba(0,0,0,0.05);">
                        ${typeIcon} <strong>${name}</strong> (${size})
                    </li>`;
                });
                html += '</ul>';
                dirFileListEl.innerHTML = html;
            } catch {
                dirFileListEl.innerHTML = '⚠️ 网络错误';
            }
        }

        // 防抖刷新目录（输入时延迟加载）
        let dirInputTimer;
        dirInput.addEventListener('input', () => {
            clearTimeout(dirInputTimer);
            dirInputTimer = setTimeout(loadDirectoryContents, 500);
        });
        refreshDirBtn.addEventListener('click', loadDirectoryContents);

        // 初始加载
        loadRepoSize();
        loadDirectoryContents();

        // ========== 拖拽/选择文件 ==========
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            addFiles(e.target.files);
            fileInput.value = '';
        });
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });

        function addFiles(files) {
            for (const file of files) {
                if (pendingFiles.some(f => f.name === file.name)) {
                    alert(`文件 "${file.name}" 已存在列表中。`);
                    continue;
                }
                pendingFiles.push(file);
            }
            renderFileList();
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        }

        function renderFileList() {
            fileListEl.innerHTML = '';
            pendingFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${escapeHtml(file.name)} (${formatSize(file.size)})</span>
                    <div style="display:flex;align-items:center;">
                        <div class="progress-bar" id="progress-${index}"><div class="progress-fill"></div></div>
                        <button class="btn btn-outline" style="padding:0.2rem 0.8rem;margin-left:1rem;" onclick="removeFile(${index})">移除</button>
                    </div>
                `;
                fileListEl.appendChild(li);
            });
        }

        window.removeFile = function(index) {
            pendingFiles.splice(index, 1);
            renderFileList();
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        };

        // ========== 上传逻辑 ==========
        uploadAllBtn.addEventListener('click', async () => {
            const token = await getToken();
            if (!token) {
                alert('请先输入 GitHub 令牌！');
                return;
            }
            let uploadDir = dirInput.value.trim();
            if (uploadDir.includes('..')) {
                alert('上传目录不能包含 ".."！');
                return;
            }
            if (uploadDir !== '' && !uploadDir.endsWith('/')) uploadDir += '/';

            if (pendingFiles.length === 0) return;

            const doSplit = splitCheckbox.checked;
            const splitSizeMB = parseInt(splitSizeInput.value) || 1;
            const splitSizeBytes = splitSizeMB * 1024 * 1024;

            uploadAllBtn.disabled = true;
            statusMsg.textContent = '上传中...';
            let success = 0, fail = 0;

            for (let i = 0; i < pendingFiles.length; i++) {
                const file = pendingFiles[i];
                try {
                    if (doSplit && file.size > splitSizeBytes) {
                        await uploadFileInChunks(file, i, token, uploadDir, splitSizeBytes);
                    } else {
                        await uploadSingleFile(file, i, token, uploadDir);
                    }
                    success++;
                } catch (err) {
                    console.error(err);
                    fail++;
                }
            }

            statusMsg.textContent = `上传完成：成功 ${success} 个，失败 ${fail} 个`;
            uploadAllBtn.disabled = false;
            if (fail === 0) {
                pendingFiles = [];
                renderFileList();
                uploadAllBtn.style.display = 'none';
            }
            // 上传完成后刷新目录列表和仓库大小
            loadRepoSize();
            loadDirectoryContents();
        });

        // 整体上传
        async function uploadSingleFile(file, index, token, uploadDir) {
            const progressBar = document.querySelector(`#progress-${index} .progress-fill`);
            const filePath = uploadDir + file.name;
            const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`;

            const base64Content = await fileToBase64(file);

            let sha = null;
            try {
                const resp = await fetch(apiUrl + '?ref=' + BRANCH, {
                    headers: getAuthHeaders(token)
                });
                if (resp.ok) {
                    const existing = await resp.json();
                    sha = existing.sha;
                }
            } catch(e){}

            const body = {
                message: `Upload ${file.name}`,
                content: base64Content,
                branch: BRANCH
            };
            if (sha) body.sha = sha;

            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', apiUrl, true);
                xhr.setRequestHeader('Authorization', `token ${token}`);
                xhr.setRequestHeader('Accept', 'application/vnd.github.v3+json');
                xhr.setRequestHeader('Content-Type', 'application/json');

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressBar.style.width = percent + '%';
                    }
                };
                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        progressBar.style.width = '100%';
                        resolve();
                    } else {
                        reject(new Error(`GitHub API 错误 (${xhr.status}): ${xhr.responseText}`));
                    }
                };
                xhr.onerror = () => reject(new Error('网络错误'));
                xhr.send(JSON.stringify(body));
            });
        }

        // 拆分上传
        async function uploadFileInChunks(file, index, token, uploadDir, chunkSize) {
            const progressBar = document.querySelector(`#progress-${index} .progress-fill`);
            const totalSize = file.size;
            const chunks = Math.ceil(totalSize / chunkSize);
            let uploadedBytes = 0;

            for (let part = 1; part <= chunks; part++) {
                const start = (part - 1) * chunkSize;
                const end = Math.min(start + chunkSize, totalSize);
                const blob = file.slice(start, end);
                const partName = `${file.name}.part${part}`;
                const filePath = uploadDir + partName;
                const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`;

                const base64Content = await blobToBase64(blob);

                let sha = null;
                try {
                    const resp = await fetch(apiUrl + '?ref=' + BRANCH, {
                        headers: getAuthHeaders(token)
                    });
                    if (resp.ok) {
                        const existing = await resp.json();
                        sha = existing.sha;
                    }
                } catch(e){}

                const body = {
                    message: `Upload ${partName}`,
                    content: base64Content,
                    branch: BRANCH
                };
                if (sha) body.sha = sha;

                const putResp = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (!putResp.ok) {
                    const error = await putResp.text();
                    throw new Error(`分块 ${part} 上传失败 (${putResp.status}): ${error}`);
                }

                uploadedBytes += (end - start);
                progressBar.style.width = (uploadedBytes / totalSize * 100) + '%';
            }
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const arrayBuffer = reader.result;
                    const bytes = new Uint8Array(arrayBuffer);
                    let binary = '';
                    const chunkSize = 8192;
                    for (let i = 0; i < bytes.length; i += chunkSize) {
                        binary += String.fromCharCode(...bytes.slice(i, i + chunkSize));
                    }
                    const base64 = btoa(binary);
                    resolve(base64.replace(/\n/g, ''));
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(blob);
            });
        }

        function fileToBase64(file) {
            return blobToBase64(file);
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/(1024*1024)).toFixed(1) + ' MB';
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
