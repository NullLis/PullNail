<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传 — PullNail</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <header>
            <h1>📤 文件上传</h1>
            <p class="subtitle">拖拽或选择文件，一键上传到服务器</p>
        </header>

        <section>
            <div class="upload-container">
                <!-- 拖拽区域 -->
                <div class="drop-zone" id="dropZone">
                    <p><strong>拖拽文件到此处</strong></p>
                    <p>或 <span style="color: var(--accent-dark); font-weight:600;">点击选择文件</span></p>
                    <input type="file" id="fileInput" multiple style="display: none;">
                </div>

                <!-- 待上传文件列表 -->
                <ul class="file-list" id="fileList"></ul>

                <!-- 全部上传按钮 -->
                <button class="btn btn-primary btn-upload" id="uploadAllBtn" style="width:100%;">上传所有文件</button>

                <!-- 状态提示 -->
                <div class="status-message" id="statusMessage"></div>
            </div>
        </section>
    </div>

    <div id="footer-container"></div>

    <script src="../js/components.js"></script>
    <script>
        // ========== 配置：修改为你的上传服务地址 ==========
        // 例如 Cloudflare Worker 提供的 R2 预签名 URL，或任何支持 PUT 的接口
        const UPLOAD_BASE_URL = 'https://your-worker.your-subdomain.workers.dev/upload/';
        // 如果你的服务器需要认证，可以在下面 xhr.setRequestHeader 中添加 token

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileListEl = document.getElementById('fileList');
        const uploadAllBtn = document.getElementById('uploadAllBtn');
        const statusMsg = document.getElementById('statusMessage');

        let pendingFiles = [];

        // 点击拖拽区域打开文件选择
        dropZone.addEventListener('click', () => fileInput.click());

        // 文件选择事件
        fileInput.addEventListener('change', (e) => {
            addFiles(e.target.files);
            fileInput.value = ''; // 清空 input，以便重新选择同一文件仍能触发
        });

        // 拖拽事件
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });

        // 添加文件到待上传列表（去重）
        function addFiles(files) {
            for (const file of files) {
                if (pendingFiles.some(f => f.name === file.name)) {
                    alert(`文件 "${file.name}" 已存在列表中。`);
                    continue;
                }
                pendingFiles.push(file);
            }
            renderFileList();
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        }

        // 渲染待上传文件列表
        function renderFileList() {
            fileListEl.innerHTML = '';
            pendingFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${escapeHtml(file.name)} (${formatSize(file.size)})</span>
                    <div style="display:flex;align-items:center;">
                        <div class="progress-bar" id="progress-${index}">
                            <div class="progress-fill"></div>
                        </div>
                        <button class="btn btn-outline" style="padding:0.2rem 0.8rem;margin-left:1rem;" onclick="removeFile(${index})">移除</button>
                    </div>
                `;
                fileListEl.appendChild(li);
            });
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/(1024*1024)).toFixed(1) + ' MB';
        }

        // 从列表中移除文件
        window.removeFile = function(index) {
            pendingFiles.splice(index, 1);
            renderFileList();
            uploadAllBtn.style.display = pendingFiles.length > 0 ? 'block' : 'none';
        };

        // 点击“上传所有文件”
        uploadAllBtn.addEventListener('click', async () => {
            if (pendingFiles.length === 0) return;
            uploadAllBtn.disabled = true;
            statusMsg.textContent = '上传中...';

            let successCount = 0, failCount = 0;
            for (let i = 0; i < pendingFiles.length; i++) {
                const file = pendingFiles[i];
                try {
                    await uploadFile(file, i);
                    successCount++;
                } catch (err) {
                    console.error(`文件 ${file.name} 上传失败:`, err);
                    failCount++;
                }
            }

            statusMsg.textContent = `上传完成：成功 ${successCount} 个，失败 ${failCount} 个`;
            uploadAllBtn.disabled = false;

            // 如果全部成功，清空列表
            if (failCount === 0) {
                pendingFiles = [];
                renderFileList();
                uploadAllBtn.style.display = 'none';
            }
        });

        // 上传单个文件（PUT 方式，支持进度）
        async function uploadFile(file, index) {
            const progressBar = document.querySelector(`#progress-${index} .progress-fill`);
            const url = UPLOAD_BASE_URL + encodeURIComponent(file.name);

            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', url, true);
                xhr.setRequestHeader('Content-Type', 'application/octet-stream');
                // 如需认证，可在此添加： xhr.setRequestHeader('Authorization', 'Bearer your-token');

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressBar.style.width = percent + '%';
                    }
                };

                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        progressBar.style.width = '100%';
                        resolve();
                    } else {
                        reject(new Error(`服务器返回状态码 ${xhr.status}`));
                    }
                };

                xhr.onerror = () => reject(new Error('网络错误'));
                xhr.send(file);
            });
        }
    </script>
</body>
</html>
