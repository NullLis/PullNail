<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传 — PullNail</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- ========== 导航栏 ========== -->
    <nav class="navbar">
        <a href="../index.html" class="nav-logo">🧱 PullNail</a>
        <button class="nav-toggle" id="navToggle">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html">首页</a></li>
            <li><a href="links.html">🕹️ 更多游戏</a></li>
            <li class="dropdown" id="communityDropdown">
                <span class="dropdown-toggle" id="communityToggle">🗣️ 社区与反馈 ▾</span>
                <ul class="dropdown-menu">
                    <li><a href="https://github.com/NullLis/PullNail/issues">💬 问题反馈</a></li>
                    <li><a href="mailto:NullLis@example.com">📧 联系开发者</a></li>
                    <li><a href="https://github.com/NullLis/PullNail">🌟 支持项目</a></li>
                </ul>
            </li>
            <li><a href="download.html">📥 下载游戏</a></li>
            <li><a href="update.html">📅 更新日志</a></li>
            <li><a href="upload.html">📤 上传文件</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>📤 文件上传</h1>
            <p class="subtitle">拖拽或选择文件，一键上传到服务器</p>
        </header>

        <section>
            <div class="upload-container">
                <div class="drop-zone" id="dropZone">
                    <p><strong>拖拽文件到此处</strong></p>
                    <p>或 <span style="color: var(--accent-dark); font-weight:600;">点击选择文件</span></p>
                    <input type="file" id="fileInput" multiple style="display: none;">
                </div>
                <ul class="file-list" id="fileList"></ul>
                <button class="btn btn-primary btn-upload" id="uploadAllBtn" style="width:100%;">上传所有文件</button>
                <div class="status-message" id="statusMessage"></div>
            </div>
        </section>
    </div>

    <!-- ========== 页脚 ========== -->
    <div class="footer">
        <div class="footer-links">
            <a href="#">服务条款</a>
            <a href="privacy.html">隐私政策</a>
        </div>
        Built with ❤️ and Unreal Engine 5 &nbsp;|&nbsp; © 2026 NullLis
    </div>

    <!-- ========== 导航栏交互脚本 ========== -->
    <script>
        const toggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');
        if (toggle && navLinks) {
            toggle.addEventListener('click', () => navLinks.classList.toggle('active'));
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => navLinks.classList.remove('active'));
            });
        }
        const dropdowns = document.querySelectorAll('.dropdown');
        dropdowns.forEach(dropdown => {
            const toggleBtn = dropdown.querySelector('.dropdown-toggle');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    dropdown.classList.toggle('active');
                });
            }
        });
        document.addEventListener('click', (e) => {
            dropdowns.forEach(d => {
                if (!d.contains(e.target)) d.classList.remove('active');
            });
        });
    </script>
    <!-- ========== 上传逻辑 ========== -->
    <script>
        // 保留你之前的上传功能完整代码（XMLHttpRequest 或 fetch）
    </script>
</body>
</html>
