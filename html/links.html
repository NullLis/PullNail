<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更多游戏 — PullNail</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <header>
            <h1>🎮 更多游戏</h1>
            <p class="subtitle">发现更多有趣的游戏，以及支持我们的好朋友们</p>
        </header>

        <section>
            <h2>🕹️ 推荐游戏</h2>
            <div id="gamesContainer" class="grid-3">
                <div class="loading">加载中…</div>
            </div>
        </section>

        <section>
            <h2>🤝 友情链接</h2>
            <div class="grid-3">
                <div class="card" style="text-align: center;">
                    <strong>精鱼宝宝的主页</strong>
                    <p style="color: var(--text-muted);">PullNail 开发者</p>
                    <a href="https://github.com/NullLis" target="_blank" rel="noopener">访问主页</a>
                </div>
                <div class="card" style="text-align: center;">
                    <strong>UE5 学习资源</strong>
                    <p style="color: var(--text-muted);">优质中文教程</p>
                    <a href="https://www.unrealengine.com/" target="_blank" rel="noopener">访问官网</a>
                </div>
                <div class="card" style="text-align: center;">
                    <strong>独立游戏社区</strong>
                    <p style="color: var(--text-muted);">开发者交流平台</p>
                    <a href="https://indienova.com/" target="_blank" rel="noopener">进入社区</a>
                </div>
            </div>
        </section>
    </div>

    <div id="footer-container"></div>

    <script src="../js/components.js"></script>
    <script>
        // 动态加载游戏列表（使用中文键名）
        (async function() {
            const container = document.getElementById('gamesContainer');
            try {
                // 修改版本号可强制刷新缓存
                const response = await fetch('../games.json?v=20260723');
                if (!response.ok) throw new Error('网络响应失败');
                const games = await response.json();

                if (!Array.isArray(games) || games.length === 0) {
                    container.innerHTML = '<div class="loading">暂无游戏</div>';
                    return;
                }

                let html = '';
                games.forEach(game => {
                    const icon = game.图标 || '🎮';
                    const url = game.在线地址 || '';
                    const detailBtn = url
                        ? `<a href="${url}" target="_blank" rel="noopener" class="btn btn-primary" style="min-width: 120px;">了解详情</a>`
                        : `<span class="btn btn-primary" style="min-width: 120px; opacity: 0.5; cursor: default;">暂无地址</span>`;

                    html += `
                        <div class="card">
                            <div class="icon-big" style="text-align:center;">${icon}</div>
                            <strong style="text-align:center; margin-top: 0.5rem;">${game.名称}</strong>
                            <p style="text-align:center; color: var(--text-muted);">${game.描述 || ''}</p>
                            <div style="text-align:center; margin-top:0.8rem;">${detailBtn}</div>
                        </div>`;
                });
                container.innerHTML = html;
            } catch (error) {
                console.error('加载游戏列表失败:', error);
                container.innerHTML = '<div class="loading">加载失败，请稍后刷新</div>';
            }
        })();
    </script>
</body>
</html>
