<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新日志 — PullNail</title>
    <style>
        :root {
            --nav-height: 64px;
            --accent: #e67e22;
            --accent-dark: #d35400;
            --text: #1e272e;
            --text-muted: #3d4f5f;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.7);
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.05);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.08);
            --radius: 20px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: linear-gradient(160deg, #fdf3e4 0%, #fce8d0 30%, #fad4a5 70%, #f7c994 100%);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            padding-top: calc(var(--nav-height) + 2rem);
            padding-bottom: 2rem;
            overflow-x: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.7);
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-dark);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.4rem 0;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent-dark);
            border-bottom-color: var(--accent-dark);
        }

        /* 当前页面高亮 */
        .nav-links a.active {
            color: var(--accent-dark);
            border-bottom-color: var(--accent-dark);
        }

        .dropdown {
            position: relative;
        }

        .dropdown-toggle {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 14px;
            padding: 0.5rem 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            list-style: none;
            min-width: 170px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.7);
        }

        .dropdown:hover .dropdown-menu,
        .dropdown.active .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(4px);
        }

        .dropdown-menu li a {
            display: block;
            padding: 0.5rem 1.2rem;
            color: var(--text);
            font-size: 0.9rem;
            border-bottom: none !important;
            white-space: nowrap;
        }

        .dropdown-menu li a:hover {
            background: rgba(0,0,0,0.04);
            color: var(--accent-dark);
        }

        .nav-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: var(--nav-height);
                left: 0;
                width: 100%;
                flex-direction: column;
                background: rgba(255,255,255,0.9);
                backdrop-filter: blur(20px);
                padding: 1rem 2rem;
                box-shadow: 0 8px 20px rgba(0,0,0,0.08);
                gap: 1rem;
                align-items: flex-start;
            }

            .nav-links.active { display: flex; }
            .nav-toggle { display: block; }

            .dropdown-menu {
                position: static;
                box-shadow: none;
                background: transparent;
                opacity: 1;
                visibility: visible;
                transform: none;
                padding-left: 1rem;
            }

            .dropdown .dropdown-menu {
                display: none;
            }

            .dropdown.active .dropdown-menu {
                display: block;
            }
        }

        .container {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #b85c1a, var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.8px;
            margin-bottom: 0.5rem;
        }

        section {
            margin-bottom: 3rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: var(--text);
            border-left: 4px solid var(--accent-dark);
            padding-left: 1rem;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--card-border);
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            white-space: normal;
        }

        th, td {
            padding: 1rem 1.2rem;
            text-align: left;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        th {
            background: rgba(0,0,0,0.02);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
        }

        tr:last-child td { border-bottom: none; }

        .footer {
            text-align: center;
            color: var(--text-muted);
            margin-top: 4rem;
            padding: 2rem 0;
            border-top: 1px solid rgba(0,0,0,0.08);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            header h1 { font-size: 2rem; }
            .container { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">🧱 PullNail</a>
        <button class="nav-toggle" id="navToggle">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html#intro">游戏简介</a></li>
            <li><a href="index.html#gameplay">核心玩法</a></li>
            <li class="dropdown" id="moreGamesDropdown">
                <span class="dropdown-toggle" id="moreGamesToggle">🕹️ 更多游戏 ▾</span>
                <ul class="dropdown-menu">
                    <li><a href="#">🧩 方块消除</a></li>
                    <li><a href="#">🚀 太空冒险</a></li>
                    <li><a href="#">🏰 塔防传说</a></li>
                </ul>
            </li>
            <li class="dropdown" id="communityDropdown">
                <span class="dropdown-toggle" id="communityToggle">🗣️ 社区与反馈 ▾</span>
                <ul class="dropdown-menu">
                    <li><a href="https://github.com/OptimalYuki/PullNail/issues">💬 问题反馈</a></li>
                    <li><a href="mailto:optimalyuki@example.com">📧 联系开发者</a></li>
                    <li><a href="https://github.com/OptimalYuki/PullNail">🌟 支持项目</a></li>
                </ul>
            </li>
            <li><a href="index.html#download">下载</a></li>
            <li><a href="index.html#config">远程配置</a></li>
            <li><a href="update.html" class="active">📅 更新日志</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>📅 更新日志</h1>
            <p class="subtitle">每一次更新，都为更好的体验</p>
        </header>

        <section>
            <h2>版本历史</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>版本</th>
                            <th>日期</th>
                            <th>内容</th>
                        </tr>
                    </thead>
                    <tbody id="changelogBody">
                        <tr>
                            <td colspan="3" style="text-align:center;">加载中…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div class="footer">
            Built with ❤️ and Unreal Engine 5 &nbsp;|&nbsp; © 2026 OptimalYuki
        </div>
    </div>

    <script>
        const toggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');

        toggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        function setupDropdown(dropdownId, toggleId) {
            const dropdown = document.getElementById(dropdownId);
            const toggleBtn = document.getElementById(toggleId);

            if (toggleBtn) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    dropdown.classList.toggle('active');
                });
            }

            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('active');
                }
            });
        }

        setupDropdown('moreGamesDropdown', 'moreGamesToggle');
        setupDropdown('communityDropdown', 'communityToggle');

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // ========== 动态加载更新日志 ==========
        (async function() {
            const tbody = document.getElementById('changelogBody');
            try {
                // 添加缓存破坏参数，每次修改 update.json 后可修改此值
                const response = await fetch('update.json?v=20260707');
                const changelog = await response.json();

                if (!Array.isArray(changelog) || changelog.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">暂无更新记录</td></tr>';
                    return;
                }

                let rows = '';
                changelog.forEach(entry => {
                    rows += `<tr>
                        <td>${entry.版本}</td>
                        <td>${entry.日期}</td>
                        <td>${entry.内容}</td>
                    </tr>`;
                });
                tbody.innerHTML = rows;
            } catch (error) {
                console.error('加载更新日志失败:', error);
                tbody.innerHTML = '<tr><td colspan="3">加载失败，请稍后刷新</td></tr>';
            }
        })();
    </script>
</body>
</html>
